<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix BPO — Gerador de Propostas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  .topbar { background: #1a1a2e; color: #fff; padding: 14px 2rem; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { width: 36px; height: 36px; background: #e8c14b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: #1a1a2e; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-sub { font-size: 12px; opacity: 0.5; margin-left: auto; }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 1.5rem; }
  .steps { display: flex; gap: 8px; margin-bottom: 1rem; }
  .step { flex: 1; height: 4px; border-radius: 2px; background: #e8e6e0; transition: background 0.3s; }
  .step.active { background: #1a1a2e; }
  .step.done { background: #2d8a5e; }
  .step-labels { display: flex; justify-content: space-between; margin-bottom: 2rem; }
  .step-labels span { font-size: 12px; color: #888; }
  .step-labels span.cur { color: #1a1a2e; font-weight: 600; }
  .section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid #f0eeea; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
  .field label .req { color: #e24b4a; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e8e6e0; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a2e; transition: border-color 0.2s; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #1a1a2e; }
  .field input:disabled { background: #f8f7f4; color: #888; }
  .field textarea { height: 80px; resize: vertical; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* CNPJ lookup row */
  .cnpj-row { display: flex; gap: 8px; }
  .cnpj-row input { flex: 1; }
  .btn-lookup { background: #1a1a2e; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.2s; }
  .btn-lookup:hover { background: #2d2d4e; }
  .btn-lookup:disabled { opacity: 0.5; cursor: not-allowed; }
  .lookup-status { font-size: 12px; margin-top: 5px; }
  .lookup-status.ok { color: #2d8a5e; }
  .lookup-status.err { color: #c0392b; }
  .lookup-status.loading { color: #888; }

  /* Ramo checkboxes */
  .ramo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
  .ramo-item { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1.5px solid #e8e6e0; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 13px; color: #555; }
  .ramo-item:hover { border-color: #1a1a2e; background: #f8f7f4; }
  .ramo-item.selected { border-color: #1a1a2e; background: #f0f0f8; color: #1a1a2e; font-weight: 600; }
  .ramo-item input[type=checkbox] { width: 14px; height: 14px; accent-color: #1a1a2e; cursor: pointer; }

  .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #f0eeea; }
  .btn-primary { background: #1a1a2e; color: #fff; border: none; padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: inherit; }
  .btn-primary:hover { background: #2d2d4e; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: transparent; color: #555; border: 1.5px solid #e8e6e0; padding: 11px 20px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-secondary:hover { background: #f5f4f0; }
  .btn-green { background: #2d8a5e; color: #fff; border: none; padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: inherit; }
  .btn-green:hover { background: #236b4a; }
  .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-blue { background: #1a6fa8; color: #fff; border: none; padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: inherit; }
  .btn-blue:hover { background: #155a87; }
  .btn-blue:disabled { opacity: 0.4; cursor: not-allowed; }
  .loading-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 1rem; background: #fff; border-radius: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e8e6e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-box p { font-size: 14px; color: #888; }
  .loading-box strong { color: #1a1a2e; }
  .proposal-wrapper { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .proposal-topbar { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; }
  .proposal-topbar .client { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .proposal-topbar .meta { font-size: 13px; opacity: 0.6; display: flex; gap: 16px; }
  .proposal-topbar .badge { display: inline-block; background: #e8c14b; color: #1a1a2e; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .proposal-body { padding: 2rem; line-height: 1.75; }
  .proposal-body h2 { font-size: 15px; font-weight: 600; color: #1a1a2e; margin: 1.5rem 0 0.75rem; border-bottom: 2px solid #f0eeea; padding-bottom: 8px; }
  .proposal-body h3 { font-size: 14px; font-weight: 600; margin: 1rem 0 0.4rem; color: #333; }
  .proposal-body p { font-size: 14px; color: #555; margin-bottom: 0.75rem; }
  .proposal-body li { font-size: 14px; color: #555; margin-bottom: 4px; margin-left: 1.2rem; }
  .proposal-body table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 1rem 0; }
  .proposal-body th { background: #f5f4f0; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: #888; }
  .proposal-body td { padding: 10px 14px; border-bottom: 1px solid #f0eeea; }
  .proposal-body strong { color: #1a1a2e; }
  .contract-banner { background: #f0f9f4; border: 1.5px solid #9fe1cb; border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; gap: 1rem; }
  .contract-banner p { font-size: 14px; color: #555; }
  .contract-banner strong { color: #1a5c3a; }
  .email-banner { background: #f0f6fd; border: 1.5px solid #a0c8f0; border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 1rem; }
  .email-banner-title { font-size: 13px; font-weight: 600; color: #1a4a6e; margin-bottom: 10px; }
  .email-banner-row { display: flex; gap: 10px; align-items: center; }
  .email-banner-row input { flex: 1; padding: 10px 12px; border: 1.5px solid #c0d8f0; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a2e; }
  .email-banner-row input:focus { outline: none; border-color: #1a6fa8; }
  .email-status { margin-top: 8px; font-size: 13px; }
  .email-status.ok { color: #1a5c3a; }
  .email-status.err { color: #791f1f; }
  .error-box { background: #fcebeb; border: 1.5px solid #f09595; border-radius: 10px; padding: 1rem 1.25rem; font-size: 13px; color: #791f1f; margin-top: 1rem; }
  .tag { display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
  .tag-pending { background: #faeeda; color: #854f0b; }
  .tag-success { background: #e8f5ee; color: #1a5c3a; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .result-header-info h2 { font-size: 18px; font-weight: 600; }
  .result-header-info p { font-size: 13px; color: #888; margin-top: 2px; }
  @media print {
    .topbar, .actions, .contract-banner, .email-banner, .result-header { display: none !important; }
    body { background: #fff; }
    .proposal-wrapper { box-shadow: none; }
  }
  @media (max-width: 600px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .ramo-grid { grid-template-columns: 1fr 1fr; }
    .contract-banner { flex-direction: column; align-items: flex-start; }
    .email-banner-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">BPO</div>
  <div class="topbar-title">Fenix BPO Financeiro — Gerador de Propostas</div>
  <span class="topbar-sub">v1.3 · Joinville/SC</span>
</div>
<div class="container">
  <div id="root"></div>
</div>
<script>
const { useState } = React;
const STEPS = ['1. Empresa', '2. Financeiro', '3. RH & Extras', '4. Proposta'];
const RAMOS = ['Serviços', 'Comércio', 'Indústria', 'Saúde', 'Educação', 'Tecnologia', 'Construção', 'Transporte', 'Alimentação'];
const INITIAL = {
  cnpj: '', razao: '', telefone: '', email: '', descricao: '',
  regime: 'Simples Nacional', ramos: [], contabilidade: 'Online/Digital',
  sistema: '', bancos: '', contas_aplicacao: '0', cartoes: '0',
  faturamento: '', recebimentos: '', notas: '', pagamentos: '',
  socios: '1', funcionarios: '0', terceiros: '0',
  obs: '', promo_meses: '6'
};

function Field({ label, required, children }) {
  return React.createElement('div', { className: 'field' },
    React.createElement('label', null, label, required && React.createElement('span', { className: 'req' }, ' *')),
    children
  );
}

function inp(form, set, k, extra = {}) {
  return { value: form[k], onChange: e => set(f => ({ ...f, [k]: e.target.value })), ...extra };
}

function renderMD(md) {
  if (!md) return null;
  const lines = md.split('\n');
  const elements = [];
  let listItems = [];
  const flushList = () => {
    if (listItems.length) { elements.push(React.createElement('ul', { key: 'ul' + elements.length }, listItems)); listItems = []; }
  };
  lines.forEach((line, i) => {
    if (line.startsWith('## ')) { flushList(); elements.push(React.createElement('h2', { key: i }, line.slice(3))); }
    else if (line.startsWith('### ')) { flushList(); elements.push(React.createElement('h3', { key: i }, line.slice(4))); }
    else if (line.startsWith('# ')) { flushList(); elements.push(React.createElement('p', { key: i, style: { fontWeight: 600, fontSize: 16, color: '#1a1a2e', marginBottom: 8 } }, line.slice(2))); }
    else if (line.startsWith('- ') || line.startsWith('* ')) { listItems.push(React.createElement('li', { key: i }, line.slice(2))); }
    else if (line.startsWith('|')) { flushList(); }
    else if (line.trim() === '') { flushList(); elements.push(React.createElement('br', { key: i })); }
    else { flushList(); elements.push(React.createElement('p', { key: i }, line)); }
  });
  flushList();
  return elements;
}

async function callAI(prompt) {
  const res = await fetch('/api/propose', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro na API');
  return data.text;
}

function formatCNPJ(v) {
  return v.replace(/\D/g, '').slice(0, 14)
    .replace(/(\d{2})(\d)/, '$1.$2')
    .replace(/(\d{3})(\d)/, '$1.$2')
    .replace(/(\d{3})(\d)/, '$1/$2')
    .replace(/(\d{4})(\d)/, '$1-$2');
}

function CnpjField({ form, setForm }) {
  const [status, setStatus] = useState('');

  const lookup = async () => {
    const digits = form.cnpj.replace(/\D/g, '');
    if (digits.length !== 14) { setStatus('err:CNPJ deve ter 14 dígitos'); return; }
    setStatus('loading');
    try {
      const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${digits}`);
      if (!res.ok) throw new Error('CNPJ não encontrado');
      const d = await res.json();
      setForm(f => ({
        ...f,
        razao: d.razao_social || f.razao,
        telefone: d.ddd_telefone_1 ? d.ddd_telefone_1.replace(/(\d{2})(\d{4,5})(\d{4})/, '($1) $2-$3') : f.telefone,
        regime: d.opcao_pelo_simples ? 'Simples Nacional' : f.regime,
      }));
      setStatus('ok:Dados preenchidos automaticamente ✓');
    } catch (e) {
      setStatus('err:' + e.message);
    }
  };

  const statusClass = status.startsWith('ok') ? 'ok' : status.startsWith('err') ? 'err' : 'loading';
  const statusMsg = status.startsWith('ok:') ? status.slice(3) : status.startsWith('err:') ? status.slice(4) : status === 'loading' ? 'Consultando Receita Federal...' : '';

  return React.createElement('div', { className: 'field' },
    React.createElement('label', null, 'CNPJ', React.createElement('span', { className: 'req' }, ' *')),
    React.createElement('div', { className: 'cnpj-row' },
      React.createElement('input', {
        type: 'text',
        placeholder: '00.000.000/0001-00',
        value: form.cnpj,
        onChange: e => setForm(f => ({ ...f, cnpj: formatCNPJ(e.target.value) })),
        onKeyDown: e => e.key === 'Enter' && lookup()
      }),
      React.createElement('button', { className: 'btn-lookup', onClick: lookup, disabled: status === 'loading' },
        status === 'loading' ? '...' : '🔍 Buscar'
      )
    ),
    statusMsg && React.createElement('div', { className: 'lookup-status ' + statusClass }, statusMsg)
  );
}

function RamoField({ form, setForm }) {
  const toggle = (ramo) => {
    setForm(f => ({
      ...f,
      ramos: f.ramos.includes(ramo) ? f.ramos.filter(r => r !== ramo) : [...f.ramos, ramo]
    }));
  };
  return React.createElement('div', { className: 'field' },
    React.createElement('label', null, 'Ramo(s) de atividade', React.createElement('span', { className: 'req' }, ' *')),
    React.createElement('div', { className: 'ramo-grid' },
      RAMOS.map(ramo =>
        React.createElement('label', {
          key: ramo,
          className: 'ramo-item' + (form.ramos.includes(ramo) ? ' selected' : ''),
          onClick: () => toggle(ramo)
        },
          React.createElement('input', { type: 'checkbox', checked: form.ramos.includes(ramo), onChange: () => toggle(ramo) }),
          ramo
        )
      )
    )
  );
}

function EmailBanner({ defaultEmail }) {
  const [emailTo, setEmailTo] = useState(defaultEmail || '');
  const [sending, setSending] = useState(false);
  const [status, setStatus] = useState('');
  const send = async () => {
    if (!emailTo) return;
    setSending(true); setStatus('');
    try {
      const res = await fetch('/api/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to: emailTo,
          subject: 'Proposta Comercial — Fenix BPO Financeiro',
          html: '<div style="font-family:sans-serif;max-width:600px;margin:0 auto"><div style="background:#1a1a2e;padding:20px 24px;border-radius:12px 12px 0 0"><span style="background:#e8c14b;color:#1a1a2e;font-weight:700;font-size:11px;padding:3px 10px;border-radius:20px">FENIX BPO FINANCEIRO</span><h1 style="color:#fff;font-size:20px;margin-top:12px">Proposta Comercial</h1></div><div style="background:#fff;padding:24px;border:1px solid #e8e6e0;border-radius:0 0 12px 12px"><p style="color:#555;font-size:14px;line-height:1.7">Segue a proposta comercial da Fenix BPO Financeiro. Em caso de duvidas, entre em contato.</p><hr style="border:none;border-top:1px solid #f0eeea;margin:20px 0"><p style="color:#888;font-size:12px">Maicon Klug — CEO, Fenix BPO Financeiro<br>maiconklug@fenixbpo.com.br | Joinville/SC</p></div></div>'
        })
      });
      const data = await res.json();
      setStatus(data.ok ? 'ok' : 'err:' + (data.error || 'Erro'));
    } catch (e) { setStatus('err:' + e.message); }
    setSending(false);
  };
  return React.createElement('div', { className: 'email-banner' },
    React.createElement('div', { className: 'email-banner-title' }, '📧 Enviar por e-mail'),
    React.createElement('div', { className: 'email-banner-row' },
      React.createElement('input', { type: 'email', placeholder: 'E-mail do cliente', value: emailTo, onChange: e => setEmailTo(e.target.value) }),
      React.createElement('button', { className: 'btn-blue', onClick: send, disabled: sending || !emailTo }, sending ? 'Enviando...' : '✉️ Enviar')
    ),
    status === 'ok' && React.createElement('div', { className: 'email-status ok' }, '✅ E-mail enviado com sucesso!'),
    status.startsWith('err:') && React.createElement('div', { className: 'email-status err' }, '❌ ' + status.slice(4))
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState(INITIAL);
  const [loading, setLoading] = useState(false);
  const [proposal, setProposal] = useState('');
  const [error, setError] = useState('');
  const [contract, setContract] = useState('');
  const [loadingContract, setLoadingContract] = useState(false);
  const [view, setView] = useState('form');
  const s = (k, extra) => inp(form, setForm, k, extra);

  const step0Valid = form.cnpj.replace(/\D/g,'').length === 14 && form.razao && form.email;
  const step1Valid = form.faturamento && form.notas;

  const generateProposal = async () => {
    setLoading(true); setError('');
    try {
      const ramoStr = form.ramos.length > 0 ? form.ramos.join(', ') : 'Não informado';
      const prompt = `Você é especialista em BPO Financeiro da empresa Fenix BPO Financeiro, de Joinville/SC. Gere uma proposta comercial profissional e personalizada.

DADOS DO CLIENTE:
- Razão Social: ${form.razao}
- CNPJ: ${form.cnpj}
- Telefone: ${form.telefone}
- Email: ${form.email}
- Ramo(s) de atividade: ${ramoStr}
- Regime tributário: ${form.regime}
- Tipo de contabilidade: ${form.contabilidade}
- Sistema atual: ${form.sistema || 'não informado'}
- Descrição: ${form.descricao || 'não informado'}

DADOS FINANCEIROS:
- Faturamento médio mensal: R$ ${form.faturamento}
- Recebimentos/mês: ${form.recebimentos}
- Notas fiscais/mês: ${form.notas}
- Pagamentos/mês: ${form.pagamentos}
- Bancos: ${form.bancos}
- Contas de aplicação: ${form.contas_aplicacao}
- Cartões: ${form.cartoes}

RH: Sócios: ${form.socios} | CLT: ${form.funcionarios} | PJ: ${form.terceiros}
Meses de promoção: ${form.promo_meses}
Observações: ${form.obs || 'nenhuma'}

ESCOPO PADRÃO FENIX BPO:
- Conciliação bancária diária (até 2 bancos; +R$150/banco adicional)
- Lançamento e organização de despesas
- Lançamento de notas no PlayBPO
- Entrada de notas de compra (requer certificado A1)
- Emissão de NFS-e (até 20/mês; +R$5/nota extra)
- Contas a pagar e receber
- Agendamentos bancários
- Interface com contabilidade
- Fluxo de caixa e relatório mensal
- Ferramenta PlayBPO inclusa

PRECIFICAÇÃO:
- Faturamento até R$100k: mensalidade R$700–900
- Faturamento R$100k–300k: mensalidade R$1.000–1.500
- Faturamento acima R$300k: mensalidade R$1.500–2.500
- Implantação: R$1.500–3.500 conforme complexidade
- Mais de 5 CLTs: +R$200 (gestão de folha)
- Promoção: desconto de 20% por ${form.promo_meses} meses
- ContaAzul opcional: R$239,90/mês

Gere em markdown com:
1. Cabeçalho (nome do cliente, data: ${new Date().toLocaleDateString('pt-BR')})
2. Apresentação Fenix BPO (2-3 linhas)
3. Entendimento do negócio (personalizado para os ramos: ${ramoStr})
4. Escopo de serviços
5. Tabela de investimento (implantação, mensalidade normal, mensalidade promocional)
6. Condições e pagamento
7. Próximos passos
8. Assinatura Maicon Klug, CEO`;
      const text = await callAI(prompt);
      if (!text) throw new Error('Resposta vazia');
      setProposal(text); setView('proposal');
    } catch (e) { setError('Erro: ' + e.message); }
    setLoading(false);
  };

  const generateContract = async () => {
    setLoadingContract(true);
    try {
      const prompt = `Com base na proposta aprovada abaixo, gere um CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE BPO FINANCEIRO completo para uso no Brasil.

PROPOSTA:
${proposal}

CONTRATADA: Fenix BPO Financeiro | CNPJ: [CNPJ_FENIX] | Joinville/SC | Rep: Maicon Klug, CEO
CONTRATANTE: ${form.razao} | CNPJ: ${form.cnpj} | Tel: ${form.telefone} | Email: ${form.email}
